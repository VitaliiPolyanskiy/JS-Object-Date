<!DOCTYPE html>

<html lang="uk" xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="utf-8" />
    <title>Робота з датами</title>
</head>

<body>
    <script>
        let currentDate = new Date(); // поточні дата та час
        document.write(currentDate + "<br />");
        let myDate = new Date("1 September 2020");
        document.write(myDate + "<br />");
        myDate = new Date("9/1/2020 12:20");
        document.write(myDate + "<br />");
        myDate = new Date(2020, 8, 1, 12, 20);
        document.write(myDate + "<br />");

        let days = ["Неділя", "Понеділок", "Вівторок", "Середа", "Четвер", "П'ятниця", "Субота"];
        let months = ["Січня", "Лютого", "Березня", "Квітня", "Травня", "Червня", "Липня", "Серпня", "Вересня", "Жовтня", "Листопада", "Грудня"];

        myDate = new Date();
        let h = myDate.getHours();
        let welcome = "";
        if (h >= 0 && h < 5)
            welcome = "Доброї ночі!";
        else if (h >= 5 && h < 12)
            welcome = "Доброго ранку!";
        else if (h >= 12 && h < 17)
            welcome = "Доброго дня!";
        else
            welcome = "Доброго вечора!";
        if (h < 10)
            h = "0" + h;
        let m = myDate.getMinutes();
        if (m < 10)
            m = "0" + m;
        let s = myDate.getSeconds();
        if (s < 10)
            s = "0" + s;
        let fullDate = days[myDate.getDay()] + ", " + myDate.getDate() + " " + months[myDate.getMonth()] +
            " " + myDate.getFullYear() + "  " + h + ":" + m + ":" + s;
        document.write("<h3>" + welcome + "</h3>");
        document.write(fullDate);

        myDate = new Date();
        myDate.setDate(12);
        myDate.setMonth(8);
        myDate.setYear(2020);

        fullDate = myDate.getDate() + " " + months[myDate.getMonth()] +
            " " + myDate.getFullYear() + ", " + days[myDate.getDay()];
        document.write("<br /><h3>День програміста</h3>" + fullDate);
    </script>
</body>

</html>
